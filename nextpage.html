<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<div class="navbar bg-white shadow px-10">

<div class="flex-1 text-lg font-bold flex items-center gap-2">
<img class="w-10" src="assets/github-logo.png" alt=""> GitHub Issues Tracker
</div>

<div class="flex gap-2">

<input id="searchInput"
type="text"
placeholder="Search issues..."
class="input input-bordered w-64">

<button onclick="searchIssue()" class="btn btn-primary">
Search
</button>

</div>

</div>


<!-- Main Section -->

<div class="max-w-7xl mx-auto mt-10">

<!-- Tabs -->

<div class="flex gap-3 mb-6">

<button id="btnAll" onclick="loadIssues()" class="btn btn-primary">
All
</button>

<button id="btnOpen" onclick="filterIssues('open')" class="btn">
Open
</button>

<button id="btnClosed" onclick="filterIssues('closed')" class="btn">
Closed
</button>

</div>


<!-- Issue Count -->

<div class="bg-white rounded-xl shadow p-6 flex justify-between items-center mb-6">

<div class="flex items-center gap-4">

<div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 text-xl">
<img src="assets/Aperture.png" alt="">
</div>

<div>

<h2 class="text-xl font-bold">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-gray-500">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-4 text-sm">

<span class="text-green-600 font-semibold">● Open</span>
<span class="text-purple-600 font-semibold">● Closed</span>

</div>


</div>


<!-- Loading -->

<div id="loader" class="hidden text-center">

<span class="loading loading-spinner loading-lg"></span>

</div>


<!-- Issues Grid -->

<div id="issuesContainer"
class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">

</div>

</div>


<!-- Modal -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="text-lg font-bold"></h3>

<p id="modalDesc" class="py-4"></p>

<p id="modalStatus"></p>
<p id="modalAuthor"></p>
<p id="modalPriority"></p>

<div class="modal-action">
<form method="dialog">
<button class="btn">Close</button>
</form>
</div>

</div>

</dialog>


<script src="test.js"></script>

</body>
</html>
