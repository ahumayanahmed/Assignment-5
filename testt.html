<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

<!-- Navbar -->
<div class="navbar bg-white shadow px-10">
    <div class="flex-1 text-lg font-bold flex items-center gap-2">
        <img class="w-10" src="assets/github-logo.png" alt=""> GitHub Issues Tracker
    </div>

    <div class="flex gap-2">
        <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered w-64">
        <button onclick="searchIssue()" class="btn btn-primary">Search</button>
    </div>
</div>

<!-- Main Section -->
<div class="max-w-7xl mx-auto mt-10">

    <!-- Tabs -->
    <div class="flex gap-3 mb-6">
        <button id="btnAll" onclick="loadIssues()" class="btn btn-primary">All</button>
        <button id="btnOpen" onclick="filterIssues('open')" class="btn">Open</button>
        <button id="btnClosed" onclick="filterIssues('closed')" class="btn">Closed</button>
    </div>

    <!-- Issue Count -->
    <div class="bg-white rounded-xl shadow p-6 flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 text-xl">
                <img src="assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 class="text-xl font-bold">
                    <span id="issueCount">0</span> Issues
                </h2>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 text-sm">
            <span class="text-green-600 font-semibold">● Open</span>
            <span class="text-purple-600 font-semibold">● Closed</span>
        </div>
    </div>

    <!-- Loading -->
    <div id="loader" class="hidden text-center">
        <span class="loading loading-spinner loading-lg"></span>
    </div>

    <!-- Issues Grid -->
    <div id="issuesContainer" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"></div>

</div>

<!-- Modal -->
<dialog id="issueModal" class="modal">
    <div class="modal-box max-w-2xl p-8">
        <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>

        <!-- STATUS ROW -->
        <div class="flex items-center gap-3 mb-6 text-sm text-gray-500">
            <span id="modalStatus" class="px-4 py-1 bg-green-500 text-white rounded-full text-xs font-semibold">Open</span>
            <span>Opened by <b id="modalAuthor">john_doe</b></span>
            <span id="modalDate">• 1/15/2024</span>
        </div>

        <!-- LABELS -->
        <div class="flex gap-3 mb-6">
            <span id="modalCategory" class="border border-red-400 text-red-500 px-4 py-1 rounded-full text-xs font-semibold">BUG</span>
            <span id="modalLabel" class="border border-yellow-400 text-yellow-600 px-4 py-1 rounded-full text-xs font-semibold">HELP WANTED</span>
        </div>

        <!-- DESCRIPTION -->
        <p id="modalDesc" class="text-gray-600 leading-relaxed mb-8">Description goes here.</p>

        <!-- ASSIGNEE + PRIORITY -->
        <div class="bg-gray-100 rounded-xl p-6 flex justify-between items-center mb-8">
            <div>
                <p class="text-gray-500 text-sm mb-1">Assignee:</p>
                <p id="modalAssignee" class="font-semibold text-lg">john_doe</p>
            </div>
            <div class="flex flex-col justify-center items-center">
                <p class="text-gray-500 text-sm mb-1">Priority:</p>
                <span id="modalPriority" class="bg-red-500 text-white px-4 py-1 rounded-full text-xs font-semibold">HIGH</span>
            </div>
        </div>

        <!-- CLOSE BUTTON -->
        <div class="flex justify-end">
            <form method="dialog">
                <button class="btn btn-primary px-6">Close</button>
            </form>
        </div>
    </div>
</dialog>

<script>
    const API = "https://phi-lab-server.vercel.app/api/v1/lab/issues";

// Load all issues
async function loadIssues() {
    document.getElementById("loader").classList.remove("hidden");
    const res = await fetch(API);
    const data = await res.json();
    displayIssues(data.data);
    document.getElementById("loader").classList.add("hidden");
    setActive("btnAll");
}

// Display issues in grid
function displayIssues(issues) {
    const container = document.getElementById("issuesContainer");
    container.innerHTML = "";
    document.getElementById("issueCount").innerText = issues.length;

    issues.forEach(issue => {
        // Border color based on status
        let borderColor = issue.status === "open" ? "border-t-4 border-green-500" : "border-t-4 border-purple-500";

        // Status icon
        let iconStyle = issue.status === "open"
            ? '<img src="assets/Open-Status.png" class="w-6 h-6">'
            : '<img src="assets/Closed-Status.png" class="w-6 h-6">';

        // Priority badge
        let priorityStyle = issue.priority === "high" ? "bg-red-100 text-red-500"
            : issue.priority === "medium" ? "bg-yellow-100 text-yellow-600"
            : "bg-purple-100 text-purple-600";

        // Label
        let labelText = "help wanted";
        if (issue.labels && issue.labels.length > 0) {
            labelText = issue.labels[0];
        }

        // Card element
        const card = document.createElement("div");
        card.className = `bg-white rounded-xl shadow ${borderColor} overflow-hidden`;
        card.innerHTML = `
            <div class="p-5">
                <div class="flex justify-between items-center mb-3">
                    <div class="w-10 h-10 bg-gray-100 flex items-center justify-center rounded-full">
                        ${iconStyle}
                    </div>
                    <span class="px-3 py-1 ${priorityStyle} text-xs rounded-full font-semibold">
                        ${issue.priority.toUpperCase()}
                    </span>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2 cursor-pointer"
                    onclick="showDetails(${issue.id})">
                    ${issue.title}
                </h3>
                <p class="text-gray-500 text-sm mb-4">
                    ${issue.description}
                </p>
                <div class="flex gap-2 mb-4">
                    <span class="border border-red-300 text-red-500 px-2 py-1 rounded-full text-xs">bug</span>
                    <span class="border border-yellow-400 text-yellow-600 px-2 py-1 rounded-full text-xs">
                        ${labelText}
                    </span>
                </div>
            </div>
            <div class="border-t px-5 py-3 text-sm text-gray-500">
                <p>#${issue.id} by ${issue.author}</p>
                <p>${new Date(issue.createdAt).toLocaleDateString()}</p>
            </div>
        `;
        container.appendChild(card);
    });
}

// Filter issues by status
async function filterIssues(status) {
    const res = await fetch(API);
    const data = await res.json();
    const filtered = data.data.filter(issue => issue.status === status);
    displayIssues(filtered);
    setActive(status === "open" ? "btnOpen" : "btnClosed");
}

// Search issues
async function searchIssue() {
    let text = document.getElementById("searchInput").value;
    const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`);
    const data = await res.json();
    displayIssues(data.data);
}

// Show modal details
async function showDetails(id) {
    const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`);
    const data = await res.json();
    const issue = data.data;

    document.getElementById("modalTitle").innerText = issue.title;
    document.getElementById("modalDesc").innerText = issue.description;

    document.getElementById("modalStatus").innerText = issue.status.charAt(0).toUpperCase() + issue.status.slice(1);
    document.getElementById("modalAuthor").innerText = issue.author;
    document.getElementById("modalDate").innerText = "• " + new Date(issue.createdAt).toLocaleDateString();
    document.getElementById("modalCategory").innerText = (issue.category || "bug").toUpperCase();
    document.getElementById("modalLabel").innerText = (issue.labels && issue.labels.length > 0 ? issue.labels[0] : "help wanted").toUpperCase();
    document.getElementById("modalAssignee").innerText = issue.author;
    document.getElementById("modalPriority").innerText = issue.priority.toUpperCase();

    document.getElementById("issueModal").showModal();
}

// Set active tab
function setActive(id) {
    ["btnAll", "btnOpen", "btnClosed"].forEach(btn => document.getElementById(btn).classList.remove("btn-primary"));
    document.getElementById(id).classList.add("btn-primary");
}

// Initial load
loadIssues();
</script>
</body>
</html>
